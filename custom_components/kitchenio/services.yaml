add_item_to_shopping_list:
  name: Add KitchenIO item to shopping list
  description: Add a KitchenIO stock item or plain item to Home Assistant's default shopping list.
  fields:
    stock_item_id:
      name: Stock item ID
      description: KitchenIO stock item ID. When set, name and amount are read from KitchenIO.
      selector:
        number:
          min: 1
          mode: box
    name:
      name: Name
      description: Plain item name to add when stock item ID is not used.
      selector:
        text:
    amount:
      name: Amount
      description: Optional amount appended to the shopping list item.
      selector:
        text:
    shopping_list_entity:
      name: Shopping list entity
      description: Home Assistant todo entity to update. Defaults to todo.shopping_list.
      default: todo.shopping_list
      selector:
        entity:
          domain: todo
