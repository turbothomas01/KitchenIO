<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ asset_version }}">
</head>
<body data-theme="{{ theme }}">
  <header class="site-header">
    <div class="header-copy">
      <div class="header-title-row">
        <h1>{{ t.app_name }}</h1>
        <a class="settings-icon" href="/settings" aria-label="{{ t.settings_icon_label }}" title="{{ t.settings }}">⚙</a>
      </div>
    </div>
  </header>

  <main>
    <section id="products-panel" class="panel" aria-label="{{ t.shopping_items }}">
      <button id="open-product-dialog" class="add-button" type="button" aria-haspopup="dialog" aria-controls="product-dialog">+ {{ t.add_shopping }}</button>
      <dialog id="product-dialog" aria-labelledby="add-product-heading" aria-modal="true">
        <form method="dialog" class="dialog-close-form">
          <button type="submit" value="cancel">{{ t.close }}</button>
        </form>
        <form method="post" action="/ui/shopping-list" aria-labelledby="add-product-heading">
          <h3 id="add-product-heading">{{ t.add_shopping }}</h3>
          <p>{{ t.plain_text_hint }}</p>
          <input type="hidden" name="lang" value="{{ lang }}">
          <input type="hidden" name="theme" value="{{ theme }}">
          <div>
            <label for="product-item">{{ t.item }}</label>
            <input id="product-item" name="item" autocomplete="off" required>
          </div>
          <div>
            <label for="product-amount">{{ t.amount }}</label>
            <input id="product-amount" name="amount" autocomplete="off" value="1" required>
          </div>
          <button type="submit">{{ t.add_shopping }}</button>
        </form>
      </dialog>

      <h3>{{ t.shopping_items }}</h3>
      {% if shopping_items %}
        <ul class="item-list" aria-label="{{ t.shopping_items }}">
        {% for item in shopping_items %}
          <li class="shopping-counter-row {% if item.completed %}completed{% endif %}" data-shopping-item-id="{{ item.id }}">
            <form method="post" action="/ui/shopping-list/{{ item.id }}/complete" class="shopping-complete-action">
              <input type="hidden" name="lang" value="{{ lang }}">
              <input type="hidden" name="theme" value="{{ theme }}">
              <input id="shopping-completed-{{ item.id }}" type="checkbox" name="completed" value="true" aria-label="{{ t.completed }}: {{ item.item }}" {% if item.completed %}checked disabled{% endif %} onchange="this.form.submit()">
              <label class="sr-only" for="shopping-completed-{{ item.id }}">{{ t.completed }}: {{ item.item }}</label>
            </form>
            <span class="shopping-counter-name" id="shopping-item-{{ item.id }}">{{ item.item }}</span>
            <form method="post" action="/ui/shopping-list/{{ item.id }}/adjust" class="stock-counter-action">
              <input type="hidden" name="lang" value="{{ lang }}">
              <input type="hidden" name="theme" value="{{ theme }}">
              <input type="hidden" name="delta" value="-1">
              <button type="submit" aria-label="{{ t.decrease_shopping }}: {{ item.item }}">−</button>
            </form>
            <span class="shopping-counter-amount" aria-label="{{ t.amount }}: {{ item.amount }}">{{ item.amount }}</span>
            <form method="post" action="/ui/shopping-list/{{ item.id }}/adjust" class="stock-counter-action">
              <input type="hidden" name="lang" value="{{ lang }}">
              <input type="hidden" name="theme" value="{{ theme }}">
              <input type="hidden" name="delta" value="1">
              <button type="submit" aria-label="{{ t.increase_shopping }}: {{ item.item }}">+</button>
            </form>
          </li>
        {% endfor %}
        </ul>
      {% else %}
        <p>{{ t.no_shopping }}</p>
      {% endif %}
    </section>
  </main>
  <script src="{{ url_for('static', path='/dialogs.js') }}?v={{ asset_version }}" defer></script>
</body>
</html>
